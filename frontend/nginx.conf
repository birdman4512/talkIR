server {
    listen 80;
    server_name _;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;

    # Security headers
    add_header X-Content-Type-Options  "nosniff"                                      always;
    add_header X-Frame-Options         "DENY"                                         always;
    add_header Referrer-Policy         "no-referrer"                                  always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self'" always;

    # Serve the SPA
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy to FastAPI — regular endpoints
    location /api/ {
        proxy_pass         http://api:8000;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_read_timeout 30s;
    }

    # Proxy to FastAPI — model pull SSE (long timeout for large downloads)
    location /api/models/pull {
        proxy_pass             http://api:8000;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       Connection        '';
        proxy_http_version     1.1;
        proxy_buffering        off;
        proxy_cache            off;
        proxy_read_timeout     3600s;
        add_header             X-Accel-Buffering no;
    }

    # Proxy to FastAPI — chat SSE (streaming, no buffering)
    location /api/chat {
        proxy_pass             http://api:8000;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       Connection        '';
        proxy_http_version     1.1;
        proxy_buffering        off;
        proxy_cache            off;
        proxy_read_timeout     620s;
        add_header             X-Accel-Buffering no;
    }
}
