[SERVICE]
    Flush           5
    Log_Level       info
    Parsers_File    /fluent-bit/etc/parsers.conf
    HTTP_Server     Off

# ─── Input ────────────────────────────────────────────────────────────────────
# Tails every *.json file in /logs/. Each line must be a JSON object.
# path_key injects the full file path into the record as "filename".
[INPUT]
    Name              tail
    Path              /logs/*.json
    Path_Key          filename
    Tag               logs
    Parser            json
    Read_From_Head    true
    Refresh_Interval  10
    DB                /tmp/fluent-bit-tails.db
    Skip_Long_Lines   On

# ─── Filter — derive index name from filename ──────────────────────────────────
# Calls set_index() which strips the path and .json extension, lowercases
# the result, and writes it to record["log_index"] for the ES output.
[FILTER]
    Name   lua
    Match  logs
    Script /fluent-bit/scripts/extract_index.lua
    Call   set_index

# ─── Output — Elasticsearch ────────────────────────────────────────────────────
# Logstash_Format = On creates dated indices: <log_index>-YYYY.MM.DD
# Logstash_Prefix_Key reads the value from record["log_index"]
[OUTPUT]
    Name                    es
    Match                   logs
    Host                    elasticsearch
    Port                    9200
    HTTP_User               elastic
    HTTP_Passwd             ${ELASTIC_PASSWORD}
    TLS                     On
    TLS.CA_File             /certs/ca/ca.crt
    TLS.Verify              On
    Logstash_Format         On
    Logstash_Prefix_Key     log_index
    Logstash_DateFormat     %Y.%m.%d
    Suppress_Type_Name      On
    Retry_Limit             5
    Buffer_Size             10MB
