[SERVICE]
    Flush           10
    Log_Level       info
    Parsers_File    /fluent-bit/etc/parsers.conf
    HTTP_Server     Off

# ─── Input ────────────────────────────────────────────────────────────────────
# Tails *.json files up to 3 levels deep under /logs/.
# Fluent Bit's glob does not support **, so comma-separate each depth.
# Exclude non-NDJSON Velociraptor metadata files (collection_context.json
# and requests.json are multi-line JSON objects — not NDJSON — and will cause
# parse errors if ingested). log.json is NDJSON but is collection metadata
# so it is dropped in the Lua filter below.
[INPUT]
    Name              tail
    Path              /logs/*.json,/logs/*/*.json,/logs/*/*/*.json
    Exclude_Path      /logs/*/collection_context.json,/logs/*/requests.json,/logs/*/*/collection_context.json,/logs/*/*/requests.json
    Path_Key          filename
    Tag               logs
    Parser            json
    Read_From_Head    true
    Refresh_Interval  10
    DB                /tmp/fluent-bit-tails.db
    Skip_Long_Lines   On
    Skip_Empty_Lines  On

# ─── Filter — enrich, normalise, and route records ────────────────────────────
# set_index() does all heavy lifting:
#   - drops Velociraptor metadata records (log.json)
#   - extracts hostname from collection folder name → record["host"]
#   - derives index name: "<host>-<artifact>" → record["log_index"]
#   - sets record["velociraptor_artifact"] from filename stem
#   - normalises @timestamp across all artefact timestamp field names
#   - flattens Hash and Authenticode nested objects
#   - sets ps_suspicious + ps_indicators on PowerShell records
#   - drops MFT records that are not executables, ADS, or interesting paths
[FILTER]
    Name   lua
    Match  logs
    Script /fluent-bit/scripts/extract_index.lua
    Call   set_index

# ─── Output — Elasticsearch ────────────────────────────────────────────────────
# Logstash_Format = On creates dated indices: <log_index>-YYYY.MM.DD
# Logstash_Prefix_Key reads the value from record["log_index"]
[OUTPUT]
    Name                    es
    Match                   logs
    Host                    elasticsearch
    Port                    9200
    HTTP_User               elastic
    HTTP_Passwd             ${ELASTIC_PASSWORD}
    TLS                     On
    TLS.CA_File             /certs/ca/ca.crt
    TLS.Verify              On
    Logstash_Format         On
    Logstash_Prefix_Key     log_index
    Logstash_DateFormat     %Y.%m.%d
    Suppress_Type_Name      On
    Retry_Limit             False
    Buffer_Size             2MB
    Workers                 1
